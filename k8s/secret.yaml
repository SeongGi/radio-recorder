# Google OAuth 시크릿
# 실제 값으로 채운 후 적용하세요.
#
# 사용법:
#   1. 아래 값을 base64로 인코딩하여 입력
#      echo -n "your-client-id" | base64
#   2. kubectl apply -f k8s/secret.yaml
#
# 또는 kubectl로 직접 생성:
#   kubectl create secret generic radio-recorder-oauth \
#     --from-literal=GOOGLE_CLIENT_ID=your-client-id \
#     --from-literal=GOOGLE_CLIENT_SECRET=your-client-secret

apiVersion: v1
kind: Secret
metadata:
  name: radio-recorder-oauth
type: Opaque
data:
  # base64 인코딩된 값을 입력하세요
  GOOGLE_CLIENT_ID: "YOUR_BASE64_ENCODED_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "YOUR_BASE64_ENCODED_CLIENT_SECRET"
