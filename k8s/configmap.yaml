apiVersion: v1
kind: ConfigMap
metadata:
  name: radio-recorder-config
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 8080
      secret_key: "change-me-to-random-secret-key"

    recording:
      output_dir: "/app/recordings"
      format: "mp3"
      bitrate: "192k"
      sample_rate: 44100
      max_retries: 3

    auth:
      google_client_id: ""
      google_client_secret: ""
      allowed_emails:
        - "sgchoi1547@gmail.com"
        - "jjukkom@gmail.com"
      rss_token: ""

    ad_detection:
      enabled: false
      silence_threshold_db: -40
      silence_min_duration: 0.5
      loudness_jump_threshold: 6

    storage:
      nas:
        server: ""
        share: ""
        username: ""
        password: ""
        remote_dir: "/"
      drive:
        folder: "Radio Recordings"

    stations:
      # ─── KBS ───
      kbs_1radio:
        name: "KBS 1라디오"
        network: "KBS"
        stream_source: "bsod"
        stream_params:
          stn: "kbs"
          ch: "1radio"
      kbs_2radio:
        name: "KBS 2라디오 (해피FM)"
        network: "KBS"
        stream_source: "bsod"
        stream_params:
          stn: "kbs"
          ch: "2radio"
      kbs_classic:
        name: "KBS 클래식FM"
        network: "KBS"
        stream_source: "bsod"
        stream_params:
          stn: "kbs"
          ch: "1fm"
      kbs_cool:
        name: "KBS 쿨FM"
        network: "KBS"
        stream_source: "bsod"
        stream_params:
          stn: "kbs"
          ch: "2fm"
      kbs_world:
        name: "KBS 한민족방송"
        network: "KBS"
        stream_source: "bsod"
        stream_params:
          stn: "kbs"
          ch: "world"
      # ─── MBC ───
      mbc_standard:
        name: "MBC 표준FM"
        network: "MBC"
        stream_source: "bsod"
        stream_params:
          stn: "mbc"
          ch: "sfm"
      mbc_fm4u:
        name: "MBC FM4U"
        network: "MBC"
        stream_source: "bsod"
        stream_params:
          stn: "mbc"
          ch: "fm4u"
      mbc_allmusic:
        name: "MBC 올댓뮤직"
        network: "MBC"
        stream_source: "bsod"
        stream_params:
          stn: "mbc"
          ch: "chm"
      # ─── SBS ───
      sbs_power:
        name: "SBS 파워FM"
        network: "SBS"
        stream_source: "bsod"
        stream_params:
          stn: "sbs"
          ch: "powerfm"
      sbs_love:
        name: "SBS 러브FM"
        network: "SBS"
        stream_source: "bsod"
        stream_params:
          stn: "sbs"
          ch: "lovefm"
      # ─── EBS ───
      ebs_fm:
        name: "EBS FM"
        network: "EBS"
        stream_source: "bsod"
        stream_params:
          stn: "ebs"
          ch: "efm"
      # ─── CBS ───
      cbs_standard:
        name: "CBS 표준FM"
        network: "CBS"
        stream_source: "bsod"
        stream_params:
          stn: "cbs"
          ch: "sfm"
      cbs_music:
        name: "CBS 음악FM"
        network: "CBS"
        stream_source: "bsod"
        stream_params:
          stn: "cbs"
          ch: "mfm"
      # ─── TBS ───
      tbs_traffic:
        name: "TBS 교통방송"
        network: "TBS"
        stream_source: "bsod"
        stream_params:
          stn: "tbs"
          ch: "tbs"
      tbs_efm:
        name: "TBS eFM (영어)"
        network: "TBS"
        stream_source: "bsod"
        stream_params:
          stn: "tbs"
          ch: "efm"
      # ─── BBS ───
      bbs:
        name: "BBS 불교방송"
        network: "BBS"
        stream_source: "bsod"
        stream_params:
          stn: "bbs"
          ch: "bbs"
      # ─── OBS ───
      obs:
        name: "OBS 경인방송"
        network: "OBS"
        stream_source: "bsod"
        stream_params:
          stn: "obs"
          ch: "obs"
      # ─── YTN ───
      ytn:
        name: "YTN 라디오"
        network: "YTN"
        stream_source: "bsod"
        stream_params:
          stn: "ytn"
          ch: "ytn"
      # ─── WBS ───
      wbs:
        name: "WBS 원음방송"
        network: "WBS"
        stream_source: "bsod"
        stream_params:
          stn: "wbs"
          ch: "wbs"

    schedules: []
