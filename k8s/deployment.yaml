apiVersion: apps/v1
kind: Deployment
metadata:
  name: radio-recorder
  labels:
    app: radio-recorder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radio-recorder
  template:
    metadata:
      labels:
        app: radio-recorder
    spec:
      initContainers:
        - name: init-config
          image: busybox
          command: ['sh', '-c', '[ ! -f /app/data/config.yaml ] && cp /app/init-config/config.yaml /app/data/config.yaml || echo "Config file already exists, skipping copy"']
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/init-config/config.yaml
              subPath: config.yaml
      containers:
        - name: radio-recorder
          image: radio-recorder:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "run.py"]
          args: ["--config", "/app/data/config.yaml"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: recordings
              mountPath: /app/recordings
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/init-config/config.yaml
              subPath: config.yaml
          env:
            - name: AUTHLIB_INSECURE_TRANSPORT
              value: "1"
          envFrom:
            - secretRef:
                name: radio-recorder-oauth
                optional: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: recordings
          persistentVolumeClaim:
            claimName: radio-recordings-pvc
        - name: data
          persistentVolumeClaim:
            claimName: radio-data-pvc
        - name: config
          configMap:
            name: radio-recorder-config
