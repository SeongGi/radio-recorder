<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Radio Recorder - 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 라디오 파형 배경 애니메이션 */
        .bg-waves {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            overflow: hidden;
        }

        .wave {
            position: absolute;
            width: 200%;
            height: 200%;
            top: 50%;
            left: 50%;
            border-radius: 45%;
            opacity: 0.03;
        }

        .wave:nth-child(1) {
            background: linear-gradient(135deg, #4a9eff, #7c3aed);
            animation: wave-rotate 20s linear infinite;
            transform: translate(-50%, -50%);
        }
        .wave:nth-child(2) {
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            animation: wave-rotate 25s linear infinite reverse;
            transform: translate(-50%, -50%);
        }
        .wave:nth-child(3) {
            background: linear-gradient(135deg, #ec4899, #4a9eff);
            animation: wave-rotate 30s linear infinite;
            transform: translate(-50%, -50%);
        }

        @keyframes wave-rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 로그인 카드 */
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            background: rgba(18, 18, 28, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            text-align: center;
            box-shadow:
                0 0 80px rgba(74, 158, 255, 0.06),
                0 32px 64px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: 56px;
            margin-bottom: 8px;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(74, 158, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 20px rgba(74, 158, 255, 0.6)); }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #4a9eff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        /* 파형 시각화 */
        .waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 40px;
            margin-bottom: 40px;
        }

        .waveform .bar {
            width: 3px;
            background: linear-gradient(to top, #4a9eff, #7c3aed);
            border-radius: 2px;
            animation: wave-bar 1.2s ease-in-out infinite;
        }

        @keyframes wave-bar {
            0%, 100% { height: 8px; opacity: 0.4; }
            50% { height: 32px; opacity: 1; }
        }

        /* Google 로그인 버튼 */
        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 32px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(74, 158, 255, 0.2);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-btn svg {
            width: 20px;
            height: 20px;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #444;
        }

        /* 방송국 아이콘 */
        .stations-preview {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 32px;
        }

        .station-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .station-badge.kbs { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .station-badge.mbc { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .station-badge.sbs { background: rgba(244, 63, 94, 0.15); color: #fb7185; }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 20px;
                max-width: 92%;
                margin: 0 auto;
            }
            h1 {
                font-size: 24px;
            }
            .subtitle {
                font-size: 13px;
                margin-bottom: 28px;
            }
            .waveform {
                margin-bottom: 28px;
            }
            .stations-preview {
                gap: 12px;
                margin-bottom: 28px;
            }
            .google-btn {
                padding: 12px 20px;
                font-size: 14px;
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-waves">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="login-card">
        <div class="logo">📻</div>
        <h1>Radio Recorder</h1>
        <p class="subtitle">한국 라디오 예약 녹음</p>

        <div class="waveform" id="waveform"></div>

        <div class="stations-preview">
            <span class="station-badge kbs">KBS</span>
            <span class="station-badge mbc">MBC</span>
            <span class="station-badge sbs">SBS</span>
        </div>

        <a href="/auth/login" class="google-btn">
            <svg viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google로 로그인
        </a>

        <div class="footer">
            개인 라디오 녹음 전용 · 외부 접근 보호됨
        </div>
    </div>

    <script>
        // 파형 애니메이션 바 생성
        const waveform = document.getElementById('waveform');
        for (let i = 0; i < 24; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.animationDelay = `${i * 0.08}s`;
            bar.style.height = `${Math.random() * 24 + 8}px`;
            waveform.appendChild(bar);
        }
    </script>
</body>
</html>
